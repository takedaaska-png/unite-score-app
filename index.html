<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユナイト・リアルタイムスコア</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, onSnapshot, query, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyC1rcomHIoitizq2NSRMsDwgDyQYksYANk",
            authDomain: "unite-score-275c6.firebaseapp.com",
            projectId: "unite-score-275c6",
            storageBucket: "unite-score-275c6.firebasestorage.app",
            messagingSenderId: "149175917391",
            appId: "1:149175917391:web:388912125db0b6f630033a",
            measurementId: "G-0TRB0FX18K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ★★★ あなたのパスワードを設定してください ★★★
        const ADMIN_PASSWORD = "AOUNITEDAISUKI0207"; 

        // パスワード確認用の共通関数
        const checkPass = () => {
            const input = prompt("管理者パスワードを入力してください");
            if (input === ADMIN_PASSWORD) return true;
            alert("パスワードが違います！");
            return false;
        };

        window.join = async (team) => {
            const name = document.getElementById('userName').value.trim();
            if(!name) return alert("名前を入力してね！");
            await setDoc(doc(db, "users", name), { name, team, score: increment(0) }, { merge: true });
            document.getElementById('status').innerText = `【参加中】${name}：${team === 'blue' ? '青' : '赤'}チーム`;
            localStorage.setItem('myUniteName', name);
        };

        window.finishMatch = async (winner) => {
            if(!checkPass()) return; // パスワードチェック
            
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => {
                const userData = userDoc.data();
                const points = (userData.team === winner) ? 5 : 2;
                batch.update(doc(db, "users", userDoc.id), { score: increment(points) });
            });
            await batch.commit();
            alert(winner + "チームの勝利加点を完了しました！");
        };

        window.resetScores = async () => {
            if(!checkPass()) return; // パスワードチェック
            if(!confirm("本当に全員のスコアを0にしますか？")) return;
            
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => {
                batch.update(doc(db, "users", userDoc.id), { score: 0 });
            });
            await batch.commit();
            alert("スコアをリセットしました！");
        };

        // ランキング表示
        const q = query(collection(db, "users"), orderBy("score", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('ranking');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = "bg-slate-700 p-3 rounded-lg flex justify-between items-center border-l-4 " + (data.team === 'blue' ? 'border-blue-500' : 'border-red-500');
                li.innerHTML = `<div><span class="font-bold">${data.name}</span><span class="text-xs ml-2 text-gray-400">${data.team === 'blue' ? '青' : '赤'}</span></div><span class="font-bold text-yellow-400 text-xl">${data.score} <small class="text-xs text-gray-400">pts</small></span>`;
                list.appendChild(li);
            });
        });

        window.onload = () => {
            const savedName = localStorage.getItem('myUniteName');
            if(savedName) document.getElementById('userName').value = savedName;
        };
    </script>
</head>
<body class="bg-slate-900 text-white p-5 font-sans min-h-screen">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-black text-center mb-2 text-yellow-500 tracking-tighter italic">UNITE RANKING</h1>
        
        <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl mb-6 border border-slate-700">
            <input id="userName" type="text" placeholder="トレーナー名" class="w-full p-3 rounded-lg text-black mb-4 font-bold outline-none">
            <div class="flex gap-3">
                <button onclick="join('blue')" class="flex-1 bg-blue-600 p-4 rounded-xl font-black text-sm">青チーム参加</button>
                <button onclick="join('red')" class="flex-1 bg-red-600 p-4 rounded-xl font-black text-sm">赤チーム参加</button>
            </div>
            <p id="status" class="mt-4 text-center text-yellow-500 font-bold text-sm h-5"></p>
        </div>

        <div class="bg-slate-800/50 p-4 rounded-2xl border-2 border-dashed border-slate-700 mb-8">
            <h2 class="text-center mb-3 text-slate-500 text-[10px] font-black uppercase tracking-widest">Admin Control (Pass Required)</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="finishMatch('blue')" class="flex-1 bg-slate-700 p-2 rounded-lg text-xs font-bold border border-blue-500/30">青の勝ち</button>
                <button onclick="finishMatch('red')" class="flex-1 bg-slate-700 p-2 rounded-lg text-xs font-bold border border-red-500/30">赤の勝ち</button>
            </div>
            <button onclick="resetScores()" class="w-full bg-red-900/40 text-red-400 py-2 rounded-lg text-[10px] font-bold border border-red-900/50">リセット</button>
        </div>

        <div>
            <h2 class="text-lg font-black mb-4"><span class="bg-yellow-500 text-black px-2 py-0.5 rounded text-sm">RANKING</span></h2>
            <ul id="ranking" class="space-y-3"></ul>
        </div>
    </div>
</body>
</html>
