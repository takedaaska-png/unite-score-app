<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユナイト・オートマッチング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, onSnapshot, query, orderBy, getDocs, writeBatch, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1rcomHIoitizq2NSRMsDwgDyQYksYANk",
            authDomain: "unite-score-275c6.firebaseapp.com",
            projectId: "unite-score-275c6",
            storageBucket: "unite-score-275c6.firebasestorage.app",
            messagingSenderId: "149175917391",
            appId: "1:149175917391:web:388912125db0b6f630033a",
            measurementId: "G-0TRB0FX18K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "unite"; 

        const checkPass = () => {
            const input = prompt("管理者パスワードを入力してください");
            return input === ADMIN_PASSWORD;
        };

        // --- エントリー処理 ---
        window.joinEntry = async () => {
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('userRole').value;
            if(!name) return alert("名前を入力してね！");
            
            await setDoc(doc(db, "users", name), { 
                name, role, score: increment(0), team: "waiting" 
            }, { merge: true });
            
            document.getElementById('status').innerText = `【エントリー済】${name}`;
            localStorage.setItem('myUniteName', name);
        };

        // --- ランダムマッチング作成 ---
        window.makeMatch = async () => {
            if(!checkPass()) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            let allPlayers = querySnapshot.docs.map(d => ({id: d.id, ...d.data()}));
            
            if(allPlayers.length < 10) return alert("あと" + (10 - allPlayers.length) + "人足りません！");

            const shuffled = allPlayers.sort(() => 0.5 - Math.random()).slice(0, 10);
            const batch = writeBatch(db);

            shuffled.forEach((p, index) => {
                const team = (index < 5) ? "blue" : "red";
                batch.update(doc(db, "users", p.id), { team: team });
            });

            await batch.commit();
            alert("マッチング完了！");
        };

        // --- 勝敗反映 ---
        window.finishMatch = async (winner) => {
            if(!checkPass()) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => {
                const data = userDoc.data();
                if(data.team === 'blue' || data.team === 'red') {
                    const points = (data.team === winner) ? 5 : 2;
                    batch.update(doc(db, "users", userDoc.id), { score: increment(points), team: "waiting" });
                }
            });
            await batch.commit();
            alert(winner + "の勝利！");
        };

        // --- スコアのみリセット ---
        window.resetScores = async () => {
            if(!checkPass()) return;
            if(!confirm("全員のスコアを0にしますか？（名前とロールは残ります）")) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => {
                batch.update(doc(db, "users", userDoc.id), { score: 0 });
            });
            await batch.commit();
            alert("スコアをリセットしました。");
        };

        // --- 全エントリー削除（配信終了時など） ---
        window.deleteAllEntries = async () => {
            if(!checkPass()) return;
            if(!confirm("【注意】全員のエントリーを完全に削除します。よろしいですか？")) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => {
                batch.delete(doc(db, "users", userDoc.id));
            });
            await batch.commit();
            alert("全エントリーを削除しました。");
        };

        // --- ランキング＆チーム表示 ---
        onSnapshot(query(collection(db, "users"), orderBy("score", "desc")), (snapshot) => {
            const list = document.getElementById('ranking');
            const blueList = document.getElementById('blueTeam');
            const redList = document.getElementById('redTeam');
            list.innerHTML = ""; blueList.innerHTML = ""; redList.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = `<li class="bg-slate-700 p-2 rounded text-sm mb-1 font-bold">${data.name} <span class="text-[9px] opacity-60 px-1 border border-slate-500 rounded">${data.role}</span></li>`;
                
                if(data.team === 'blue') blueList.innerHTML += card;
                else if(data.team === 'red') redList.innerHTML += card;
                
                const rankLi = document.createElement('li');
                rankLi.className = "flex justify-between border-b border-slate-800 py-1 text-sm items-center";
                rankLi.innerHTML = `<div><span class="font-bold">${data.name}</span> <span class="text-[8px] text-gray-500 ml-1">${data.role}</span></div><span class="text-yellow-500 font-mono">${data.score}pt</span>`;
                list.appendChild(rankLi);
            });
        });

        window.onload = () => {
            const savedName = localStorage.getItem('myUniteName');
            if(savedName) document.getElementById('userName').value = savedName;
        };
    </script>
</head>
<body class="bg-slate-900 text-white p-4 font-sans max-w-md mx-auto min-h-screen">
    <h1 class="text-2xl font-black text-center mb-4 text-yellow-500 italic">UNITE MATCHMAKER</h1>
    
    <div class="bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700 shadow-xl">
        <input id="userName" type="text" placeholder="トレーナー名" class="w-full p-2 rounded text-black mb-2 font-bold outline-none text-sm">
        <select id="userRole" class="w-full p-2 rounded text-black mb-3 text-sm font-bold bg-white">
            <option value="希望なし">希望なし</option>
            <option value="スピードバランス">スピードバランス</option>
            <option value="アタック">アタック</option>
            <option value="サポートタンク">サポートタンク</option>
        </select>
        <button onclick="joinEntry()" class="w-full bg-yellow-500 text-black py-3 rounded-xl font-black text-sm active:scale-95 transition">エントリーする</button>
        <p id="status" class="mt-2 text-center text-xs text-yellow-500 font-bold h-4"></p>
    </div>

    <div class="bg-slate-800/80 p-4 rounded-xl mb-4 border-2 border-slate-700">
        <h2 class="text-[9px] font-black mb-2 text-slate-500 uppercase tracking-widest text-center">Admin Dashboard</h2>
        <button onclick="makeMatch()" class="w-full bg-white text-black py-2 rounded font-black text-xs mb-3 shadow-lg hover:bg-gray-200">マッチング抽選開始 (10名)</button>
        
        <div class="flex gap-2 mb-4">
            <button onclick="finishMatch('blue')" class="flex-1 bg-blue-600 p-2 rounded text-[10px] font-bold shadow-md shadow-blue-900/50">青チーム勝利</button>
            <button onclick="finishMatch('red')" class="flex-1 bg-red-600 p-2 rounded text-[10px] font-bold shadow-md shadow-red-900/50">赤チーム勝利</button>
        </div>

        <div class="flex gap-2 border-t border-slate-700 pt-3">
            <button onclick="resetScores()" class="flex-1 bg-slate-700 text-slate-300 py-1 rounded text-[9px] font-bold hover:bg-red-900 hover:text-white transition">スコアのみ0に</button>
            <button onclick="deleteAllEntries()" class="flex-1 bg-slate-700 text-slate-300 py-1 rounded text-[9px] font-bold hover:bg-red-900 hover:text-white transition">参加者全削除</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-blue-900/20 p-2 rounded-lg border border-blue-500/30">
            <h3 class="text-blue-400 font-black text-[10px] mb-2 italic text-center">BLUE TEAM</h3>
            <ul id="blueTeam" class="min-h-[50px]"></ul>
        </div>
        <div class="bg-red-900/20 p-2 rounded-lg border border-red-500/30">
            <h3 class="text-red-400 font-black text-[10px] mb-2 italic text-center">RED TEAM</h3>
            <ul id="redTeam" class="min-h-[50px]"></ul>
        </div>
    </div>

    <div class="bg-slate-800 p-4 rounded-xl shadow-inner">
        <h2 class="text-[10px] font-black mb-3 text-slate-400 italic uppercase">Ranking / Entry List</h2>
        <ul id="ranking" class="space-y-1"></ul>
    </div>
</body>
</html>
