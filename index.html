<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNITE PRO HUB - CLEAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, onSnapshot, query, orderBy, getDocs, writeBatch, arrayUnion, getDoc, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1rcomHIoitizq2NSRMsDwgDyQYksYANk",
            authDomain: "unite-score-275c6.firebaseapp.com",
            projectId: "unite-score-275c6",
            storageBucket: "unite-score-275c6.firebasestorage.app",
            messagingSenderId: "149175917391",
            appId: "1:149175917391:web:388912125db0b6f630033a",
            measurementId: "G-0TRB0FX18K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "unite"; 
        const ROLES = ["希望なし", "スピードバランス", "アタック", "サポートタンク"];

        let feedbackCounts = {};
        let targetPlayer = "";
        let isAdminMode = false;

        const checkAdmin = () => prompt("管理者パスワード") === ADMIN_PASSWORD;
        const verifyUser = async (name) => {
            if(isAdminMode) return true;
            const pass = prompt(`${name} さんの4桁パスワード`);
            const userSnap = await getDoc(doc(db, "users", name));
            return userSnap.exists() && userSnap.data().password === pass;
        };

        window.toggleAdminMode = () => {
            if(!isAdminMode) {
                if(checkAdmin()) {
                    isAdminMode = true;
                    document.getElementById('adminBadge').classList.remove('hidden');
                    alert("管理者モード: ON");
                }
            } else {
                isAdminMode = false;
                document.getElementById('adminBadge').classList.add('hidden');
                alert("管理者モード: OFF");
            }
        };

        window.joinEntry = async () => {
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('userRole').value;
            const pass = document.getElementById('userPass').value.trim();
            if(!name || pass.length !== 4) return alert("名前と4桁パスを入力！");
            await setDoc(doc(db, "users", name), { 
                name, role, password: pass, score: increment(0), wins: increment(0), matches: increment(0),
                team: "waiting", active: true, past_teammates: [] 
            }, { merge: true });
        };

        window.toggleActive = async (name, currentStatus) => await updateDoc(doc(db, "users", name), { active: !currentStatus });
        window.changeRole = async (name, newRole) => {
            if (await verifyUser(name)) await updateDoc(doc(db, "users", name), { role: newRole });
        };

        window.makeMatch = async () => {
            if(!checkAdmin()) return;
            const snap = await getDocs(collection(db, "users"));
            const players = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.active);
            if(players.length < 10) return alert("10人必要です");
            const sPool = players.filter(p => p.role === "スピードバランス").sort(() => 0.5 - Math.random());
            const aPool = players.filter(p => p.role === "アタック").sort(() => 0.5 - Math.random());
            const tPool = players.filter(p => p.role === "サポートタンク").sort(() => 0.5 - Math.random());
            const wPool = players.filter(p => p.role === "希望なし").sort(() => 0.5 - Math.random());
            const selS = sPool.slice(0, 4); const selA = aPool.slice(0, 2); const selT = tPool.slice(0, 4);
            let remW = [...wPool];
            while(selS.length < 4 && remW.length > 0) selS.push(remW.shift());
            while(selA.length < 2 && remW.length > 0) selA.push(remW.shift());
            while(selT.length < 4 && remW.length > 0) selT.push(remW.shift());
            if(selS.length < 4 || selA.length < 2 || selT.length < 4) return alert("人数不足");
            const getWR = p => p.matches > 0 ? p.wins / p.matches : 0.5;
            const split = (pool, size) => {
                pool.sort((a, b) => getWR(b) - getWR(a));
                const t1 = [], t2 = [];
                pool.forEach(p => { if(t1.length < size) t1.push(p); else t2.push(p); });
                return [t1, t2];
            };
            const [s1, s2] = split(selS, 2); const [a1, a2] = split(selA, 1); const [t1, t2] = split(selT, 2);
            const batch = writeBatch(db);
            const allSnap = await getDocs(collection(db, "users"));
            allSnap.docs.forEach(d => batch.update(doc(db, "users", d.id), { team: "waiting" }));
            [...s1, ...a1, ...t1].forEach(p => batch.update(doc(db, "users", p.id), { team: "blue" }));
            [...s2, ...a2, ...t2].forEach(p => batch.update(doc(db, "users", p.id), { team: "red" }));
            await batch.commit();
        };

        window.finishMatch = async (winner) => {
            if(!checkAdmin()) return;
            const snap = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            const combatants = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.team !== "waiting");
            const blue = combatants.filter(p => p.team === "blue").map(p => p.name);
            const red = combatants.filter(p => p.team === "red").map(p => p.name);
            combatants.forEach(p => {
                const win = (p.team === winner);
                batch.update(doc(db, "users", p.id), { 
                    score: increment(win ? 5 : 2), matches: increment(1), wins: win ? increment(1) : increment(0),
                    team: "waiting", active: false,
                    past_teammates: arrayUnion(...(p.team === "blue" ? blue : red).filter(n => n !== p.name))
                });
            });
            await batch.commit();
        };

        window.openModal = (name, type) => {
            targetPlayer = name;
            document.getElementById('modalTitle').innerText = `${name} さんへの${type}`;
            document.getElementById('modalType').value = type;
            const select = document.getElementById('reasonSelect');
            select.innerHTML = "";
            const options = type === "通報" 
                ? ["暴言", "不快な態度", "放置", "あからさまな利敵", "ルール違反"]
                : ["ドラフトピック", "序盤", "中盤", "ラストオブジェクト", "オブジェクト後"];
            options.forEach(opt => select.innerHTML += `<option value="${opt}">${opt}</option>`);
            document.getElementById('feedbackModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('feedbackModal').classList.add('hidden');

        window.submitFeedback = async () => {
            const type = document.getElementById('modalType').value;
            const category = document.getElementById('reasonSelect').value;
            const comment = document.getElementById('freeWord').value.trim();
            const sender = localStorage.getItem('myUniteName') || "匿名";
            if(!comment) return alert("内容を入力してください");
            await addDoc(collection(db, type === "通報" ? "reports" : "feedbacks"), {
                target: targetPlayer, sender, category, comment, timestamp: serverTimestamp()
            });
            alert("送信しました");
            closeModal();
            document.getElementById('freeWord').value = "";
        };

        window.viewMyFeedback = async (name) => {
            if (await verifyUser(name)) {
                try {
                    let html = `<h4 class="text-yellow-500 font-bold mb-4 border-b border-yellow-500/30 pb-1 italic uppercase text-[10px]">${name} への記録</h4>`;
                    if(isAdminMode) {
                        const repSnap = await getDocs(query(collection(db, "reports"), where("target", "==", name), orderBy("timestamp", "desc")));
                        repSnap.forEach(doc => {
                            const d = doc.data();
                            html += `<div class="bg-red-900/20 p-3 rounded-lg mb-3 border-l-4 border-red-600 shadow"><div class="flex justify-between text-[8px] text-red-400 mb-1 font-black"><span>🚨通報: ${d.category}</span><span>From: ${d.sender}</span></div><p class="text-[11px] text-red-100 font-bold">${d.comment}</p></div>`;
                        });
                    }
                    const fbSnap = await getDocs(query(collection(db, "feedbacks"), where("target", "==", name), orderBy("timestamp", "desc")));
                    fbSnap.forEach(doc => {
                        const d = doc.data();
                        const date = d.timestamp ? d.timestamp.toDate().toLocaleString('ja-JP') : "---";
                        html += `<div class="bg-slate-900 p-3 rounded-lg mb-3 border-l-4 border-blue-500 shadow"><div class="flex justify-between text-[8px] text-slate-400 mb-1 font-bold"><span>💡 ${d.category}</span><span>${date}</span></div><p class="text-[11px] text-slate-100 font-medium">${d.comment}</p>${isAdminMode ? `<div class="text-[7px] text-blue-400/40 mt-1 text-right">From: ${d.sender}</div>` : ''}</div>`;
                    });
                    if (html.indexOf('shadow') === -1) html += `<p class="text-xs text-slate-500 text-center py-4">データがありません</p>`;
                    document.getElementById('feedbackContent').innerHTML = html;
                    document.getElementById('viewModal').classList.remove('hidden');
                } catch (e) { console.error(e); alert("取得エラー。インデックスを確認してください。"); }
            }
        };

        window.closeViewModal = () => document.getElementById('viewModal').classList.add('hidden');

        onSnapshot(collection(db, "feedbacks"), (snap) => {
            feedbackCounts = {};
            snap.forEach(doc => {
                const t = doc.data().target;
                feedbackCounts[t] = (feedbackCounts[t] || 0) + 1;
            });
        });

        onSnapshot(query(collection(db, "users"), orderBy("score", "desc")), (snapshot) => {
            const list = document.getElementById('ranking');
            const bL = document.getElementById('blueTeam');
            const rL = document.getElementById('redTeam');
            list.innerHTML = ""; bL.innerHTML = ""; rL.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const wr = data.matches > 0 ? ((data.wins / data.matches) * 100).toFixed(1) : "0.0";
                const count = feedbackCounts[data.name] || 0;
                const feedbackBtnHtml = (count > 0 || isAdminMode)
                    ? `<button onclick="viewMyFeedback('${data.name}')" class="text-[7px] bg-blue-600 text-white px-1.5 py-0.5 rounded shadow-sm hover:bg-blue-500 ml-2 font-bold ring-1 ring-blue-400/50 italic">📩 ${isAdminMode ? '管理閲覧' : '意見'} (${count})</button>`
                    : `<button class="text-[7px] bg-slate-800 text-slate-500 px-1.5 py-0.5 rounded ml-2 font-bold opacity-60 cursor-not-allowed">📩 届いていません</button>`;

                const card = `<li class="bg-slate-700 p-2 rounded text-[10px] mb-1 font-bold flex justify-between shadow"><span>${data.name}</span><span class="opacity-40 text-[7px] border border-white/20 px-1 rounded uppercase">${data.role}</span></li>`;
                if(data.team === 'blue') bL.innerHTML += card; else if(data.team === 'red') rL.innerHTML += card;
                
                const rankLi = document.createElement('li');
                rankLi.className = "flex justify-between items-center border-b border-slate-800 py-2";
                let opts = ROLES.map(r => `<option value="${r}" ${data.role === r ? 'selected' : ''}>${r}</option>`).join('');
                rankLi.innerHTML = `<div class="flex items-center gap-2"><input type="checkbox" ${data.active ? 'checked' : ''} onchange="toggleActive('${data.name}', ${data.active})" class="w-4 h-4 accent-yellow-500 cursor-pointer"><div><div class="text-xs font-bold ${data.active ? 'text-white' : 'text-gray-600'}">${data.name}</div><div class="flex gap-2 items-center"><select onchange="changeRole('${data.name}', this.value)" class="text-[8px] bg-slate-900 border border-slate-700 rounded px-1 py-0.5 text-slate-300 outline-none">${opts}</select><span class="text-[7px] text-slate-500 font-bold uppercase">W:${wr}%</span></div><div class="flex gap-1 mt-1 items-center"><button onclick="openModal('${data.name}', '通報')" class="text-[7px] bg-red-900/40 text-red-400 px-1 rounded hover:bg-red-800 border border-red-500/20">通報</button><button onclick="openModal('${data.name}', '意見')" class="text-[7px] bg-blue-900/40 text-blue-400 px-1 rounded hover:bg-blue-800 border border-blue-500/20">意見</button>${feedbackBtnHtml}</div></div></div><span class="text-yellow-500 font-mono text-xs font-black italic">${data.score}pt</span>`;
                list.appendChild(rankLi);
            });
        });
    </script>
</head>
<body class="bg-slate-900 text-white p-4 font-sans max-w-md mx-auto min-h-screen pb-20">
    <header class="text-center mb-4 relative">
        <h1 class="text-2xl font-black text-yellow-500 italic tracking-tighter uppercase">Unite Pro Hub</h1>
        <div id="adminBadge" class="hidden absolute -top-2 right-0 bg-red-600 text-[8px] px-2 py-0.5 rounded-full font-black animate-bounce shadow-lg">ADMIN MODE</div>
    </header>
    
    <div class="bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700 shadow-xl">
        <div class="grid grid-cols-2 gap-2 mb-2">
            <input id="userName" type="text" placeholder="名前" class="p-2 rounded text-black font-bold outline-none text-xs">
            <input id="userPass" type="password" maxlength="4" placeholder="4桁パス" class="p-2 rounded text-black font-bold outline-none text-xs">
        </div>
        <select id="userRole" class="w-full p-2 rounded text-black text-xs font-bold bg-white mb-2 outline-none font-bold">
            <option value="希望なし">希望なし</option>
            <option value="スピードバランス">スピードバランス</option>
            <option value="アタック">アタック</option>
            <option value="サポートタンク">サポートタンク</option>
        </select>
        <button onclick="joinEntry()" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-black text-xs active:scale-95 transition shadow-lg uppercase">Entry Match</button>
    </div>

    <div class="bg-slate-800/80 p-4 rounded-xl mb-4 border-2 border-slate-700">
        <button onclick="makeMatch()" class="w-full bg-white text-black py-3 rounded-lg font-black text-[10px] mb-3 shadow-lg active:bg-gray-200 uppercase">Generate Match</button>
        <div class="flex gap-2">
            <button onclick="finishMatch('blue')" class="flex-1 bg-blue-600 p-2 rounded font-bold text-[9px] shadow-lg uppercase text-white">Blue Win</button>
            <button onclick="finishMatch('red')" class="flex-1 bg-red-600 p-2 rounded font-bold text-[9px] shadow-lg uppercase text-white">Red Win</button>
        </div>
        <button onclick="toggleAdminMode()" class="w-full mt-4 border border-slate-600 text-slate-400 py-1.5 rounded-lg font-black text-[8px] hover:bg-slate-700 uppercase tracking-widest transition">Admin Mode Switch</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="bg-blue-900/40 p-2 rounded-lg border border-blue-500/50 min-h-[140px]">
            <h2 class="text-blue-400 font-black text-[9px] mb-2 text-center italic border-b border-blue-500/30 pb-1 uppercase">Team Blue</h2>
            <ul id="blueTeam"></ul>
        </div>
        <div class="bg-red-900/40 p-2 rounded-lg border border-red-500/50 min-h-[140px]">
            <h2 class="text-red-400 font-black text-[9px] mb-2 text-center italic border-b border-red-500/30 pb-1 uppercase">Team Red</h2>
            <ul id="redTeam"></ul>
        </div>
    </div>

    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700/50 shadow-inner">
        <h2 class="text-[9px] font-black mb-3 text-slate-400 uppercase text-center italic border-b border-slate-700 pb-2">Player Stats & Feedback</h2>
        <ul id="ranking" class="space-y-1"></ul>
    </div>

    <div id="feedbackModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-slate-800 w-full max-w-xs p-5 rounded-2xl border border-slate-600 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-black mb-4 text-yellow-500 italic uppercase">通報/意見</h3>
            <input type="hidden" id="modalType">
            <select id="reasonSelect" class="w-full p-2 rounded bg-white text-black font-bold text-xs mb-4 outline-none"></select>
            <textarea id="freeWord" class="w-full p-2 rounded bg-slate-900 text-white text-xs mb-4 h-24 outline-none border border-slate-700 focus:border-yellow-500" placeholder="内容を入力..."></textarea>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-slate-700 py-2 rounded font-bold text-xs uppercase text-white">戻る</button>
                <button onclick="submitFeedback()" class="flex-1 bg-yellow-500 py-2 rounded text-black font-black text-xs uppercase">送信</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="fixed inset-0 bg-black/95 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-slate-800 w-full max-w-sm p-6 rounded-2xl border border-slate-600 shadow-2xl flex flex-col max-h-[80vh]">
            <div id="feedbackContent" class="overflow-y-auto flex-1 pr-1"></div>
            <button onclick="closeViewModal()" class="mt-4 w-full bg-slate-700 py-3 rounded-lg font-black text-xs uppercase shadow-lg text-white">閉じる</button>
        </div>
    </div>
</body>
</html>
