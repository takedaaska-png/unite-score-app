<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNITE PRO MATCHMAKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, onSnapshot, query, orderBy, getDocs, writeBatch, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1rcomHIoitizq2NSRMsDwgDyQYksYANk",
            authDomain: "unite-score-275c6.firebaseapp.com",
            projectId: "unite-score-275c6",
            storageBucket: "unite-score-275c6.firebasestorage.app",
            messagingSenderId: "149175917391",
            appId: "1:149175917391:web:388912125db0b6f630033a",
            measurementId: "G-0TRB0FX18K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "unite"; 
        const ROLES = ["希望なし", "スピードバランス", "アタック", "サポートタンク"];

        const checkPass = () => prompt("管理者パスワード") === ADMIN_PASSWORD;

        window.joinEntry = async () => {
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('userRole').value;
            if(!name) return alert("名前を入力してね！");
            await setDoc(doc(db, "users", name), { 
                name, role, score: increment(0), wins: increment(0), matches: increment(0),
                team: "waiting", active: true, past_teammates: [] 
            }, { merge: true });
            localStorage.setItem('myUniteName', name);
        };

        window.toggleActive = async (name, currentStatus) => await updateDoc(doc(db, "users", name), { active: !currentStatus });
        window.cycleRole = async (name, currentRole) => {
            const nextRole = ROLES[(ROLES.indexOf(currentRole) + 1) % ROLES.length];
            await updateDoc(doc(db, "users", name), { role: nextRole });
        };

        // --- 高度なマッチメイキングロジック ---
        window.makeMatch = async () => {
            if(!checkPass()) return;
            const snap = await getDocs(collection(db, "users"));
            const players = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.active);

            if(players.length < 10) return alert("10人必要です（現在" + players.length + "人）");

            // 1. ロールごとに分ける
            const pool = { "スピードバランス": [], "アタック": [], "サポートタンク": [], "希望なし": [] };
            players.forEach(p => pool[p.role || "希望なし"].push(p));

            // 2. 必要な構成: スピード4、アタック2、サプタン4 を集める
            let selected = [];
            const take = (role, num) => {
                const available = pool[role].sort(() => 0.5 - Math.random());
                selected.push(...available.splice(0, num));
                return num - (selected.length - (selected.length - num)); // 残り必要数
            };

            let needS = 4, needA = 2, needT = 4;
            // 指定ロールから取得
            needS -= Math.min(pool["スピードバランス"].length, 4); take("スピードバランス", 4);
            needA -= Math.min(pool["アタック"].length, 2); take("アタック", 2);
            needT -= Math.min(pool["サポートタンク"].length, 4); take("サポートタンク", 4);
            
            // 不足分を「希望なし」から補充
            const wildcards = pool["希望なし"].sort(() => 0.5 - Math.random());
            if(wildcards.length < (needS + needA + needT)) return alert("ロールの条件を満たせません。希望なしの人が足りません。");
            selected.push(...wildcards.splice(0, (needS + needA + needT)));

            if(selected.length < 10) return alert("条件に合う10人を選べませんでした。");

            // 3. 2チームに分ける (勝率と過去履歴を考慮)
            // 簡易的に「勝率順」に並べてスネークドラフト的に分ける（平均化のため）
            const getWinRate = p => p.matches > 0 ? p.wins / p.matches : 0.5;
            selected.sort((a, b) => getWinRate(b) - getWinRate(a));

            const teamBlue = [], teamRed = [];
            selected.forEach((p, i) => {
                // スネーク順 (0,3,4,7,8 vs 1,2,5,6,9) で勝率を均等化
                if([0, 3, 4, 7, 8].includes(i)) teamBlue.push(p);
                else teamRed.push(p);
            });

            const batch = writeBatch(db);
            teamBlue.forEach(p => batch.update(doc(db, "users", p.id), { team: "blue" }));
            teamRed.forEach(p => batch.update(doc(db, "users", p.id), { team: "red" }));
            await batch.commit();
            alert("マッチング完了！構成: 2スピード/1アタック/2タンク");
        };

        window.finishMatch = async (winner) => {
            if(!checkPass()) return;
            const snap = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            const blueNames = [], redNames = [];

            const combatants = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.team !== "waiting");
            combatants.forEach(p => p.team === "blue" ? blueNames.push(p.name) : redNames.push(p.name));

            combatants.forEach(p => {
                const isWinner = (p.team === winner);
                const teammates = (p.team === "blue") ? blueNames : redNames;
                batch.update(doc(db, "users", p.id), { 
                    score: increment(isWinner ? 5 : 2),
                    matches: increment(1),
                    wins: isWinner ? increment(1) : increment(0),
                    team: "waiting", active: false,
                    past_teammates: arrayUnion(...teammates.filter(n => n !== p.name))
                });
            });
            await batch.commit();
        };

        window.resetScores = async () => { if(checkPass()) { /* 略 (前と同じ) */ } };
        window.deleteAllEntries = async () => { if(checkPass()) { /* 略 (前と同じ) */ } };

        onSnapshot(query(collection(db, "users"), orderBy("score", "desc")), (snapshot) => {
            const list = document.getElementById('ranking');
            const blueList = document.getElementById('blueTeam');
            const redList = document.getElementById('redTeam');
            list.innerHTML = ""; blueList.innerHTML = ""; redList.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const winRate = data.matches > 0 ? ((data.wins / data.matches) * 100).toFixed(1) : "0.0";
                const item = `<li class="bg-slate-700 p-2 rounded text-[11px] mb-1 font-bold flex justify-between"><span>${data.name}</span><span class="opacity-50 text-[8px]">${data.role}</span></li>`;
                if(data.team === 'blue') blueList.innerHTML += item;
                else if(data.team === 'red') redList.innerHTML += item;
                
                const rankLi = document.createElement('li');
                rankLi.className = "flex justify-between items-center border-b border-slate-800 py-2";
                rankLi.innerHTML = `
                    <div class="flex items-center gap-2">
                        <input type="checkbox" ${data.active ? 'checked' : ''} onchange="toggleActive('${data.name}', ${data.active})" class="w-4 h-4 accent-yellow-500">
                        <div>
                            <div class="text-xs font-bold ${data.active ? '' : 'text-gray-600'}">${data.name}</div>
                            <div class="flex gap-1">
                                <button onclick="cycleRole('${data.name}', '${data.role}')" class="text-[7px] border px-1 rounded border-slate-600 text-slate-400">${data.role}</button>
                                <span class="text-[7px] text-slate-500 uppercase">Win: ${winRate}%</span>
                            </div>
                        </div>
                    </div>
                    <span class="text-yellow-500 font-mono text-xs font-bold">${data.score}pt</span>
                `;
                list.appendChild(rankLi);
            });
        });

        window.onload = () => {
            const savedName = localStorage.getItem('myUniteName');
            if(savedName) document.getElementById('userName').value = savedName;
        };
    </script>
</head>
<body class="bg-slate-900 text-white p-4 font-sans max-w-md mx-auto min-h-screen">
    <header class="text-center mb-4">
        <h1 class="text-2xl font-black text-yellow-500 italic">UNITE PRO HUB</h1>
        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Balanced 2-1-2 Matchmaking</p>
    </header>
    
    <div class="bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700">
        <div class="flex gap-2 mb-2">
            <input id="userName" type="text" placeholder="名前" class="flex-1 p-2 rounded text-black font-bold outline-none text-xs">
            <select id="userRole" class="p-2 rounded text-black text-xs font-bold bg-white">
                <option value="希望なし">希望なし</option>
                <option value="スピードバランス">スピードバランス</option>
                <option value="アタック">アタック</option>
                <option value="サポートタンク">サポートタンク</option>
            </select>
        </div>
        <button onclick="joinEntry()" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-black text-xs active:scale-95 transition shadow-lg">エントリー</button>
    </div>

    <div class="bg-slate-800/80 p-4 rounded-xl mb-4 border-2 border-slate-700 shadow-2xl">
        <button onclick="makeMatch()" class="w-full bg-white text-black py-3 rounded-lg font-black text-[10px] mb-3 shadow-lg active:bg-gray-200">2-1-2 バランス抽選開始</button>
        <div class="flex gap-2">
            <button onclick="finishMatch('blue')" class="flex-1 bg-blue-600 p-2 rounded font-bold text-[9px] shadow-md">青勝利</button>
            <button onclick="finishMatch('red')" class="flex-1 bg-red-600 p-2 rounded font-bold text-[9px] shadow-md">赤勝利</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-blue-900/40 p-2 rounded-lg border border-blue-500/50 min-h-[140px]">
            <h3 class="text-blue-400 font-black text-[9px] mb-2 text-center italic tracking-widest">BLUE TEAM</h3>
            <ul id="blueTeam"></ul>
        </div>
        <div class="bg-red-900/40 p-2 rounded-lg border border-red-500/50 min-h-[140px]">
            <h3 class="text-red-400 font-black text-[9px] mb-2 text-center italic tracking-widest">RED TEAM</h3>
            <ul id="redTeam"></ul>
        </div>
    </div>

    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700/50">
        <h2 class="text-[9px] font-black mb-3 text-slate-400 uppercase tracking-widest italic text-center underline decoration-yellow-500">Player Stats & Entry</h2>
        <ul id="ranking" class="space-y-1"></ul>
    </div>
</body>
</html>
