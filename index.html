<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユナイト・5vs5確定マッチング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, onSnapshot, query, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1rcomHIoitizq2NSRMsDwgDyQYksYANk",
            authDomain: "unite-score-275c6.firebaseapp.com",
            projectId: "unite-score-275c6",
            storageBucket: "unite-score-275c6.firebasestorage.app",
            messagingSenderId: "149175917391",
            appId: "1:149175917391:web:388912125db0b6f630033a",
            measurementId: "G-0TRB0FX18K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "unite"; 

        const checkPass = () => {
            const input = prompt("管理者パスワードを入力してください");
            return input === ADMIN_PASSWORD;
        };

        window.joinEntry = async () => {
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('userRole').value;
            if(!name) return alert("名前を入力してね！");
            await setDoc(doc(db, "users", name), { name, role, score: increment(0), team: "waiting", active: true }, { merge: true });
            document.getElementById('status').innerText = `【エントリー済】${name}`;
            localStorage.setItem('myUniteName', name);
        };

        window.toggleActive = async (name, currentStatus) => {
            await updateDoc(doc(db, "users", name), { active: !currentStatus });
        };

        // --- 【重要】必ず10名選んで5vs5にするロジック ---
        window.makeMatch = async () => {
            if(!checkPass()) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            
            // チェックが入っている人だけを抽出
            let activeCandidates = querySnapshot.docs
                .map(d => ({id: d.id, ...d.data()}))
                .filter(p => p.active === true);
            
            // 10人未満ならエラーを出して終了
            if(activeCandidates.length < 10) {
                return alert("チェック済みの人が " + activeCandidates.length + " 人しかいません。\n5vs5を作るにはあと " + (10 - activeCandidates.length) + " 人にチェックを入れてもらってください！");
            }

            // シャッフルして先頭の10名だけを確定で選出
            const selectedPlayers = activeCandidates.sort(() => 0.5 - Math.random()).slice(0, 10);
            
            const batch = writeBatch(db);
            selectedPlayers.forEach((p, index) => {
                // index 0~4 (5人) は青、5~9 (5人) は赤
                const team = (index < 5) ? "blue" : "red";
                batch.update(doc(db, "users", p.id), { team: team });
            });

            await batch.commit();
            alert("チェック済みの人から10名を選出し、5vs5を作成しました！");
        };

        window.finishMatch = async (winner) => {
            if(!checkPass()) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => {
                const data = userDoc.data();
                if(data.team === 'blue' || data.team === 'red') {
                    const points = (data.team === winner) ? 5 : 2;
                    batch.update(doc(db, "users", userDoc.id), { score: increment(points), team: "waiting", active: false });
                }
            });
            await batch.commit();
            alert("対戦者のポイント加算とチェック解除が完了しました。");
        };

        window.resetScores = async () => {
            if(!checkPass()) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => batch.update(doc(db, "users", userDoc.id), { score: 0 }));
            await batch.commit();
        };

        window.deleteAllEntries = async () => {
            if(!checkPass()) return;
            const querySnapshot = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            querySnapshot.docs.forEach(userDoc => batch.delete(doc(db, "users", userDoc.id)));
            await batch.commit();
        };

        onSnapshot(query(collection(db, "users"), orderBy("score", "desc")), (snapshot) => {
            const list = document.getElementById('ranking');
            const blueList = document.getElementById('blueTeam');
            const redList = document.getElementById('redTeam');
            list.innerHTML = ""; blueList.innerHTML = ""; redList.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = `<li class="bg-slate-700 p-2 rounded text-[11px] mb-1 font-bold flex justify-between items-center animate-fade-in">
                    <span>${data.name}</span>
                    <span class="opacity-50 text-[8px] border border-white/20 px-1 rounded">${data.role}</span>
                </li>`;
                
                if(data.team === 'blue') blueList.innerHTML += card;
                else if(data.team === 'red') redList.innerHTML += card;
                
                const rankLi = document.createElement('li');
                rankLi.className = "flex justify-between items-center border-b border-slate-800 py-2";
                rankLi.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${data.active ? 'checked' : ''} 
                            onchange="toggleActive('${data.name}', ${data.active})"
                            class="w-5 h-5 accent-yellow-500 cursor-pointer">
                        <div>
                            <div class="text-sm font-bold ${data.active ? 'text-white' : 'text-gray-600'}">${data.name}</div>
                            <div class="text-[9px] text-gray-500">${data.role}</div>
                        </div>
                    </div>
                    <span class="text-yellow-500 font-mono text-sm">${data.score}pt</span>
                `;
                list.appendChild(rankLi);
            });
        });

        window.onload = () => {
            const savedName = localStorage.getItem('myUniteName');
            if(savedName) document.getElementById('userName').value = savedName;
        };
    </script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-900 text-white p-4 font-sans max-w-md mx-auto min-h-screen">
    <h1 class="text-2xl font-black text-center mb-4 text-yellow-500 italic tracking-tight">UNITE 5vs5 MATCH</h1>
    
    <div class="bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700 shadow-lg">
        <input id="userName" type="text" placeholder="名前" class="w-full p-2 rounded text-black mb-2 font-bold outline-none text-sm">
        <select id="userRole" class="w-full p-2 rounded text-black mb-3 text-sm font-bold bg-white outline-none">
            <option value="希望なし">希望なし</option>
            <option value="スピードバランス">スピードバランス</option>
            <option value="アタック">アタック</option>
            <option value="サポートタンク">サポートタンク</option>
        </select>
        <button onclick="joinEntry()" class="w-full bg-yellow-500 text-black py-3 rounded-xl font-black text-sm active:scale-95 transition">エントリー</button>
        <p id="status" class="mt-2 text-center text-[10px] text-yellow-500 h-4"></p>
    </div>

    <div class="bg-slate-800/80 p-4 rounded-xl mb-4 border-2 border-slate-700 shadow-2xl">
        <button onclick="makeMatch()" class="w-full bg-white text-black py-3 rounded-lg font-black text-xs mb-3 shadow-lg active:bg-gray-200">チェック済みから10名選出 (5vs5)</button>
        <div class="flex gap-2">
            <button onclick="finishMatch('blue')" class="flex-1 bg-blue-600 p-3 rounded font-bold text-[10px] shadow-lg active:scale-95">青勝利</button>
            <button onclick="finishMatch('red')" class="flex-1 bg-red-600 p-3 rounded font-bold text-[10px] shadow-lg active:scale-95">赤勝利</button>
        </div>
        <div class="flex gap-4 mt-4 pt-3 border-t border-slate-700 justify-center">
            <button onclick="resetScores()" class="text-[9px] text-slate-500">スコア0</button>
            <button onclick="deleteAllEntries()" class="text-[9px] text-slate-500">全員削除</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-blue-900/40 p-2 rounded-lg border border-blue-500/50 shadow-[0_0_10px_rgba(59,130,246,0.2)]">
            <h3 class="text-blue-400 font-black text-[10px] mb-2 text-center italic tracking-widest">BLUE TEAM</h3>
            <ul id="blueTeam" class="min-h-[120px]"></ul>
        </div>
        <div class="bg-red-900/40 p-2 rounded-lg border border-red-500/50 shadow-[0_0_10px_rgba(239,68,68,0.2)]">
            <h3 class="text-red-400 font-black text-[10px] mb-2 text-center italic tracking-widest">RED TEAM</h3>
            <ul id="redTeam" class="min-h-[120px]"></ul>
        </div>
    </div>

    <div class="bg-slate-800 p-4 rounded-xl shadow-inner border border-slate-700/50">
        <h2 class="text-[10px] font-black mb-3 text-slate-400 uppercase tracking-widest">Player List / Waiting</h2>
        <ul id="ranking" class="space-y-1"></ul>
    </div>
</body>
</html>
