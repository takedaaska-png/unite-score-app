<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNITE PRO HUB - FINAL STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, onSnapshot, query, orderBy, getDocs, writeBatch, arrayUnion, getDoc, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1rcomHIoitizq2NSRMsDwgDyQYksYANk",
            authDomain: "unite-score-275c6.firebaseapp.com",
            projectId: "unite-score-275c6",
            storageBucket: "unite-score-275c6.firebasestorage.app",
            messagingSenderId: "149175917391",
            appId: "1:149175917391:web:388912125db0b6f630033a",
            measurementId: "G-0TRB0FX18K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "unite"; 
        const ROLES = ["希望なし", "スピードバランス", "アタック", "サポートタンク"];

        let feedbackCounts = {};
        let targetPlayer = "";
        let isAdminMode = false;

        const checkAdmin = () => prompt("管理者パスワード") === ADMIN_PASSWORD;
        const verifyUser = async (name) => {
            if(isAdminMode) return true;
            const pass = prompt(`${name} さんの4桁パスワード`);
            const userSnap = await getDoc(doc(db, "users", name));
            return userSnap.exists() && userSnap.data().password === pass;
        };

        window.toggleAdminMode = () => {
            if(!isAdminMode) {
                if(checkAdmin()) {
                    isAdminMode = true;
                    document.getElementById('adminBadge').classList.remove('hidden');
                    alert("管理者モード: ON");
                }
            } else {
                isAdminMode = false;
                document.getElementById('adminBadge').classList.add('hidden');
                alert("管理者モード: OFF");
            }
        };

        window.joinEntry = async () => {
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('userRole').value;
            const pass = document.getElementById('userPass').value.trim();
            if(!name || pass.length !== 4) return alert("名前と4桁パスを入力！");
            await setDoc(doc(db, "users", name), { 
                name, role, password: pass, score: increment(0), wins: increment(0), matches: increment(0),
                team: "waiting", active: true, past_teammates: [] 
            }, { merge: true });
        };

        window.toggleActive = async (name, currentStatus) => await updateDoc(doc(db, "users", name), { active: !currentStatus });
        window.changeRole = async (name, newRole) => {
            if (await verifyUser(name)) await updateDoc(doc(db, "users", name), { role: newRole });
        };

        window.makeMatch = async () => {
            if(!checkAdmin()) return;
            const snap = await getDocs(collection(db, "users"));
            const players = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.active);
            if(players.length < 10) return alert("10人必要です");
            const sPool = players.filter(p => p.role === "スピードバランス").sort(() => 0.5 - Math.random());
            const aPool = players.filter(p => p.role === "アタック").sort(() => 0.5 - Math.random());
            const tPool = players.filter(p => p.role === "サポートタンク").sort(() => 0.5 - Math.random());
            const wPool = players.filter(p => p.role === "希望なし").sort(() => 0.5 - Math.random());
            const selS = sPool.slice(0, 4); const selA = aPool.slice(0, 2); const selT = tPool.slice(0, 4);
            let remW = [...wPool];
            while(selS.length < 4 && remW.length > 0) selS.push(remW.shift());
            while(selA.length < 2 && remW.length > 0) selA.push(remW.shift());
            while(selT.length < 4 && remW.length > 0) selT.push(remW.shift());
            if(selS.length < 4 || selA.length < 2 || selT.length < 4) return alert("人数不足");
            const getWR = p => p.matches > 0 ? p.wins / p.matches : 0.5;
            const split = (pool, size) => {
                pool.sort((a, b) => getWR(b) - getWR(a));
                const t1 = [], t2 = [];
                pool.forEach(p => {
                    if(t1.length < size) t1.push(p); else t2.push(p);
                });
                return [t1, t2];
            };
            const [s1, s2] = split(selS, 2); const [a1, a2] = split(selA, 1); const [t1, t2] = split(selT, 2);
            const batch = writeBatch(db);
            const allSnap = await getDocs(collection(db, "users"));
            allSnap.docs.forEach(d => batch.update(doc(db, "users", d.id), { team: "waiting" }));
            [...s1, ...a1, ...t1].forEach(p => batch.update(doc(db, "users", p.id), { team: "blue" }));
            [...s2, ...a2, ...t2].forEach(p => batch.update(doc(db, "users", p.id), { team: "red" }));
            await batch.commit();
        };

        window.finishMatch = async (winner) => {
            if(!checkAdmin()) return;
            const snap = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            const combatants = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.team !== "waiting");
            const blue = combatants.filter(p => p.team === "blue").map(p => p.name);
            const red = combatants.filter(p => p.team === "red").map(p => p.name);
            combatants.forEach(p => {
                const win = (p.team === winner);
                batch.update(doc(db, "users", p.id), { 
                    score: increment(win ? 5 : 2), matches: increment(1), wins: win ? increment(1) : increment(0),
                    team: "waiting", active: false,
                    past_teammates: arrayUnion(...(p.team === "blue" ? blue : red).filter(n => n !== p.name))
                });
            });
            await batch.commit();
        };

        window.openModal = (name, type) => {
            targetPlayer = name;
            document.getElementById('modalTitle').innerText = `${name} さんへの${type}`;
            document.getElementById('modalType').value = type;
            const select = document.getElementById('reasonSelect');
            select.innerHTML = "";
            const options = type === "通報" 
                ? ["暴言", "不快な態度", "放置", "あからさまな利敵", "ルール違反"]
                : ["ドラフトピック", "序盤", "中盤", "ラストオブジェクト", "オブジェクト後"];
            options.forEach(opt => select.innerHTML += `<option value="${opt}">${opt}</option>`);
            document.getElementById('feedbackModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('feedbackModal').classList.add('hidden');

        window.submitFeedback = async () => {
            const type = document.getElementById('modalType').value;
            const category = document.getElementById('reasonSelect').value;
            const comment = document.getElementById('freeWord').value.trim();
            const sender = localStorage.getItem('myUniteName') || "匿名";
            if(!comment) return alert("内容を入力してください");
            await addDoc(collection(db, type === "通報" ? "reports" : "feedbacks"), {
                target: targetPlayer, sender, category, comment, timestamp: serverTimestamp()
            });
            alert("送信しました");
            closeModal();
            document.getElementById('freeWord').value = "";
        };

        window.viewMyFeedback = async (name) => {
            if (await verifyUser(name)) {
                try {
                    let html = `<h4 class="text-yellow-500 font-bold mb-4 border-b border-yellow-500/30 pb-1 italic uppercase text-[10px]">${name} への記録</h4>`;
                    
                    if(isAdminMode) {
                        const repSnap = await getDocs(query(collection(db, "reports"), where("target", "==", name), orderBy("timestamp", "desc")));
                        repSnap.forEach(doc => {
                            const d = doc.data();
                            html += `<div class="bg-red-900/20 p-3 rounded-lg mb-3 border-l-4 border-red-600 shadow">
                                        <div class="flex justify-between text-[8px] text-red-400 mb-1 font-black"><span>🚨通報: ${d.category}</span><span>From: ${d.sender}</span></div>
                                        <p class="text-[11px] text-red-100 font-bold leading-relaxed">${d.comment}</p>
                                     </div>`;
                        });
                    }

                    const fbSnap = await getDocs(query(collection(db, "feedbacks"), where("target", "==", name), orderBy("timestamp", "desc")));
                    fbSnap.forEach(doc => {
                        const d = doc.data();
                        const date = d.timestamp ? d.timestamp.toDate().toLocaleString('ja-JP') : "---";
                        html += `<div class="bg-slate-900 p-3 rounded-lg mb-3 border-l-4 border-blue-500 shadow">
                                    <div class="flex justify-between text-[8px] text-slate-400 mb-1 font-bold"><span>💡 ${d.category}</span><span>${date}</span></div>
                                    <p class="text-[11px] text-slate-100 leading-relaxed font-medium">${d.comment}</p>
                                    ${isAdminMode ? `<div class="text-[7px] text-blue-400/40 mt-1 text-right italic">投稿者: ${d.sender}</div>` : ''}
                                 </div>`;
                    });

                    if (html.indexOf('shadow') === -1) html += `<p class="text-xs text-slate-500 text-center py-4">データがありません</p>`;
                    
                    document.getElementById('feedbackContent').innerHTML = html;
                    document.getElementById('viewModal').classList.remove('hidden');
                } catch (e) {
                    console.error(e);
                    alert("インデックス作成中か、エラーが発生しました。コンソールを確認してください。");
                }
            }
        };

        window.closeViewModal = () => document.getElementById('viewModal').classList.add('hidden');

        onSnapshot(collection(db, "feedbacks"), (snap) => {
            feedbackCounts = {};
            snap.forEach(doc => {
                const t = doc.data().target;
                feedbackCounts[t] = (feedbackCounts[t] || 0) + 1;
            });
        });

        onSnapshot(query(collection(db, "users"), orderBy("score", "desc")), (snapshot) => {
            const list = document.getElementById('ranking');
            const bL = document.getElementById('blueTeam');
            const rL = document.getElementById('redTeam');
            list.innerHTML = ""; bL.innerHTML = ""; rL.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const wr = data.matches > 0 ? ((data.wins / data.matches) * 100).toFixed(1) : "0.0";
                const count = feedbackCounts[data.name] || 0;
                
                const feedbackBtnHtml = (count > 0 || isAdminMode)
                    ? `<button onclick="viewMyFeedback('${data.name}')" class="text-[7px] bg-blue-600 text-white px-1.5 py-0.5 rounded shadow-sm hover
