<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNITE 2-1-2 FIXED MATCHMAKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, onSnapshot, query, orderBy, getDocs, writeBatch, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1rcomHIoitizq2NSRMsDwgDyQYksYANk",
            authDomain: "unite-score-275c6.firebaseapp.com",
            projectId: "unite-score-275c6",
            storageBucket: "unite-score-275c6.firebasestorage.app",
            messagingSenderId: "149175917391",
            appId: "1:149175917391:web:388912125db0b6f630033a",
            measurementId: "G-0TRB0FX18K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "unite"; 
        const ROLES = ["希望なし", "スピードバランス", "アタック", "サポートタンク"];

        window.joinEntry = async () => {
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('userRole').value;
            if(!name) return alert("名前を入力してね！");
            await setDoc(doc(db, "users", name), { 
                name, role, score: increment(0), wins: increment(0), matches: increment(0),
                team: "waiting", active: true, past_teammates: [] 
            }, { merge: true });
        };

        window.toggleActive = async (name, currentStatus) => await updateDoc(doc(db, "users", name), { active: !currentStatus });
        window.cycleRole = async (name, currentRole) => {
            const nextRole = ROLES[(ROLES.indexOf(currentRole) + 1) % ROLES.length];
            await updateDoc(doc(db, "users", name), { role: nextRole });
        };

        // --- 厳格な2-1-2構成マッチメイキング ---
        window.makeMatch = async () => {
            const input = prompt("管理者パスワード");
            if(input !== ADMIN_PASSWORD) return;

            const snap = await getDocs(collection(db, "users"));
            const players = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.active);

            // ロールごとのプール
            const sPool = players.filter(p => p.role === "スピードバランス").sort(() => 0.5 - Math.random());
            const aPool = players.filter(p => p.role === "アタック").sort(() => 0.5 - Math.random());
            const tPool = players.filter(p => p.role === "サポートタンク").sort(() => 0.5 - Math.random());
            const wPool = players.filter(p => p.role === "希望なし").sort(() => 0.5 - Math.random());

            // 10名を選抜 (各枠を埋める)
            const selectedS = sPool.slice(0, 4);
            const selectedA = aPool.slice(0, 2);
            const selectedT = tPool.slice(0, 4);
            
            // 不足分をワイルドカード(希望なし)から補充
            let remainingW = [...wPool];
            while(selectedS.length < 4 && remainingW.length > 0) selectedS.push(remainingW.shift());
            while(selectedA.length < 2 && remainingW.length > 0) selectedA.push(remainingW.shift());
            while(selectedT.length < 4 && remainingW.length > 0) selectedT.push(remainingW.shift());

            if(selectedS.length < 4 || selectedA.length < 2 || selectedT.length < 4) {
                return alert(`構成エラー: スピード(4), アタック(2), タンク(4) が必要です。\n現在: スピード系 ${selectedS.length}, アタック系 ${selectedA.length}, タンク系 ${selectedT.length}`);
            }

            // 勝率計算関数
            const getWinRate = p => p.matches > 0 ? p.wins / p.matches : 0.5;

            // 各ロールペアを勝率と履歴で2分割する関数
            const splitBalanced = (pool, sizePerTeam) => {
                pool.sort((a, b) => getWinRate(b) - getWinRate(a)); // 勝率順
                const t1 = [], t2 = [];
                pool.forEach((p, i) => {
                    const score1 = t1.filter(m => p.past_teammates?.includes(m.name)).length;
                    const score2 = t2.filter(m => p.past_teammates?.includes(m.name)).length;
                    // 勝率スネーク + 履歴重み
                    if(t1.length < sizePerTeam && (t2.length === sizePerTeam || score1 <= score2)) t1.push(p);
                    else t2.push(p);
                });
                return [t1, t2];
            };

            const [s1, s2] = splitBalanced(selectedS, 2);
            const [a1, a2] = splitBalanced(selectedA, 1);
            const [t1, t2] = splitBalanced(selectedT, 2);

            const teamBlue = [...s1, ...a1, ...t1];
            const teamRed = [...s2, ...a2, ...t2];

            const batch = writeBatch(db);
            const allSnap = await getDocs(collection(db, "users"));
            allSnap.docs.forEach(d => batch.update(doc(db, "users", d.id), { team: "waiting" }));
            teamBlue.forEach(p => batch.update(doc(db, "users", p.id), { team: "blue" }));
            teamRed.forEach(p => batch.update(doc(db, "users", p.id), { team: "red" }));
            await batch.commit();
            alert("2-1-2構成、勝率、過去履歴をすべて反映しました！");
        };

        window.finishMatch = async (winner) => {
            const input = prompt("パスワード");
            if(input !== ADMIN_PASSWORD) return;
            const snap = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            const blue = [], red = [];
            const combatants = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(p => p.team !== "waiting");
            combatants.forEach(p => (p.team === "blue" ? blue : red).push(p.name));

            combatants.forEach(p => {
                const win = (p.team === winner);
                batch.update(doc(db, "users", p.id), { 
                    score: increment(win ? 5 : 2), matches: increment(1), wins: win ? increment(1) : increment(0),
                    team: "waiting", active: false,
                    past_teammates: arrayUnion(...(p.team === "blue" ? blue : red).filter(n => n !== p.name))
                });
            });
            await batch.commit();
        };

        onSnapshot(query(collection(db, "users"), orderBy("score", "desc")), (snapshot) => {
            const list = document.getElementById('ranking');
            const blueList = document.getElementById('blueTeam');
            const redList = document.getElementById('redTeam');
            list.innerHTML = ""; blueList.innerHTML = ""; redList.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const winRate = data.matches > 0 ? ((data.wins / data.matches) * 100).toFixed(1) : "0.0";
                const card = `<li class="bg-slate-700 p-2 rounded text-[10px] mb-1 font-bold flex justify-between shadow"><span>${data.name}</span><span class="opacity-40 text-[7px] border border-white/20 px-1 rounded">${data.role}</span></li>`;
                if(data.team === 'blue') blueList.innerHTML += card;
                else if(data.team === 'red') redList.innerHTML += card;
                
                const rankLi = document.createElement('li');
                rankLi.className = "flex justify-between items-center border-b border-slate-800 py-2";
                rankLi.innerHTML = `
                    <div class="flex items-center gap-2">
                        <input type="checkbox" ${data.active ? 'checked' : ''} onchange="toggleActive('${data.name}', ${data.active})" class="w-4 h-4 accent-yellow-500 cursor-pointer">
                        <div>
                            <div class="text-xs font-bold ${data.active ? 'text-white' : 'text-gray-600'}">${data.name}</div>
                            <div class="flex gap-2 items-center">
                                <button onclick="cycleRole('${data.name}', '${data.role}')" class="text-[7px] border px-1 rounded border-slate-600 text-slate-400 bg-slate-900/50">${data.role}</button>
                                <span class="text-[7px] text-slate-500 font-bold uppercase">Win: ${winRate}%</span>
                            </div>
                        </div>
                    </div>
                    <span class="text-yellow-500 font-mono text-xs font-black italic">${data.score}<small class="text-[8px] ml-0.5">PT</small></span>
                `;
                list.appendChild(rankLi);
            });
        });
    </script>
</head>
<body class="bg-slate-900 text-white p-4 font-sans max-w-md mx-auto min-h-screen">
    <h1 class="text-2xl font-black text-center mb-4 text-yellow-500 italic tracking-tighter">UNITE 2-1-2 ELITE</h1>
    
    <div class="bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700 shadow-xl">
        <div class="flex gap-2 mb-2">
            <input id="userName" type="text" placeholder="名前" class="flex-1 p-2 rounded text-black font-bold outline-none text-xs">
            <select id="userRole" class="p-2 rounded text-black text-xs font-bold bg-white">
                <option value="希望なし">希望なし</option>
                <option value="スピードバランス">スピードバランス</option>
                <option value="アタック">アタック</option>
                <option value="サポートタンク">サポートタンク</option>
            </select>
        </div>
        <button onclick="joinEntry()" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-black text-xs active:scale-95 transition">エントリー</button>
    </div>

    <div class="bg-slate-800/80 p-4 rounded-xl mb-4 border-2 border-slate-700">
        <button onclick="makeMatch()" class="w-full bg-white text-black py-3 rounded-lg font-black text-[10px] mb-3 shadow-lg active:bg-gray-200">2スピード/1アタック/2タンク 抽選開始</button>
        <div class="flex gap-2">
            <button onclick="finishMatch('blue')" class="flex-1 bg-blue-600 p-2 rounded font-bold text-[9px] shadow-lg">BLUE WIN</button>
            <button onclick="finishMatch('red')" class="flex-1 bg-red-600 p-2 rounded font-bold text-[9px] shadow-lg">RED WIN</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-blue-900/40 p-2 rounded-lg border border-blue-500/50 min-h-[140px]">
            <h2 class="text-blue-400 font-black text-[9px] mb-2 text-center italic tracking-widest border-b border-blue-500/30 pb-1">BLUE (2-1-2)</h2>
            <ul id="blueTeam"></ul>
        </div>
        <div class="bg-red-900/40 p-2 rounded-lg border border-red-500/50 min-h-[140px]">
            <h2 class="text-red-400 font-black text-[9px] mb-2 text-center italic tracking-widest border-b border-red-500/30 pb-1">RED (2-1-2)</h2>
            <ul id="redTeam"></ul>
        </div>
    </div>

    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700/50">
        <h2 class="text-[9px] font-black mb-3 text-slate-400 uppercase tracking-widest text-center">Live Stats / Waiting List</h2>
        <ul id="ranking" class="space-y-1"></ul>
    </div>
</body>
</html>
